{% extends 'base.html' %}

{% block title %}Questionnaire{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3" style="gap:1em;">
    <img src="{% static 'img/hospital.svg' %}" alt="Hospital" style="height:40px;" />
    <h2 class="mb-0">Questionnaire</h2>
</div>
<form method="post">
    {% csrf_token %}
    {% for q in questions %}
    <div class="bar" style="background:#e0e0e0;"></div>
    <div class="form-group d-flex align-items-start" style="gap:1em;">
        <span style="width:24px;display:inline-block;"></span>
        <div style="flex:1;">
            <label>{{ q.sort_order }}. {{ q.text }}</label>
            <textarea class="form-control" name="q_{{ q.id }}"></textarea>
        </div>
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Submit</button>
</form>
{% endblock %}
