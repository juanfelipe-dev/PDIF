{% extends "admin/login.html" %}
{% load static %}

{% block content %}
    <div id="content" class="login">
        <h1>{% block branding %}{% include "admin/base_site.html" %}{% endblock %}</h1>
        <form action="" method="post" id="login-form">{% csrf_token %}
            <div class="form-row">
                <label for="id_username">Username:</label>
                <input type="text" name="username" autofocus required id="id_username" placeholder="admin">
            </div>
            <div class="form-row">
                <label for="id_password">Password:</label>
                <input type="password" name="password" required id="id_password" placeholder="admin123">
            </div>
            <div class="submit-row">
                <input type="submit" value="Log in">
            </div>
        </form>
    </div>
{% endblock %}
